<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#051020"/>
    </linearGradient>
    
    <linearGradient id="bladeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#0099ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a4a" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    
    <!-- Blade shadow -->
    <linearGradient id="bladeShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="540" r="200" fill="url(#bladeShadow)" opacity="0.3"/>
  <circle cx="1180" cy="100" r="150" fill="url(#bladeShadow)" opacity="0.2"/>
  
  <!-- Left side: Blade icon -->
  <g transform="translate(120, 180)">
    <!-- Blade shadow -->
    <path d="M 30 20 L 30 180 L 80 100 Z" fill="#00d4ff" opacity="0.1" transform="translate(10, 10)"/>
    
    <!-- Blade body -->
    <path d="M 20 10 L 20 200 L 70 105 Z" fill="url(#bladeGradient)" filter="url(#glow)"/>
    
    <!-- Blade edge highlight -->
    <path d="M 25 15 L 25 195 L 55 105 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    
    <!-- Blade tip glow -->
    <circle cx="20" cy="10" r="8" fill="#00d4ff" filter="url(#strongGlow)"/>
    
    <!-- Handle -->
    <rect x="15" y="200" width="20" height="40" rx="3" fill="#0066ff" filter="url(#glow)"/>
    <rect x="18" y="205" width="14" height="30" rx="2" fill="#0044aa"/>
    
    <!-- Handle detail -->
    <line x1="22" y1="215" x2="22" y2="225" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
    <line x1="22" y1="230" x2="22" y2="235" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Center: Main title -->
  <g transform="translate(400, 200)">
    <!-- Chinese title -->
    <text x="0" y="0" font-family="'WenQuanYi Zen Hei', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" filter="url(#glow)">热点刀锋</text>
    
    <!-- English subtitle -->
    <text x="0" y="70" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#8899bb" letter-spacing="4">HOTSPOT BLADE</text>
    
    <!-- Decorative line -->
    <line x1="0" y1="100" x2="320" y2="100" stroke="url(#accentGradient)" stroke-width="2"/>
    <circle cx="320" cy="100" r="4" fill="#00d4ff" filter="url(#glow)"/>
    
    <!-- Tagline -->
    <text x="0" y="140" font-family="'WenQuanYi Zen Hei', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#667799">多平台热榜抓取 · 爆款微头条一键生成</text>
  </g>
  
  <!-- Right side: Platform icons circle -->
  <g transform="translate(950, 320)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#1a2a4a" stroke-width="1" stroke-dasharray="5,5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#003366" stroke-width="1"/>
    
    <!-- Connection lines to center -->
    <line x1="0" y1="-120" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    <line x1="104" y1="-60" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    <line x1="104" y1="60" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="120" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    <line x1="-104" y1="60" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    <line x1="-104" y1="-60" x2="0" y2="0" stroke="#003366" stroke-width="1" opacity="0.5"/>
    
    <!-- Platform icons (simplified representations) -->
    <!-- Zhihu (top) -->
    <g transform="translate(0, -135)">
      <circle cx="0" cy="0" r="22" fill="#0066ff" filter="url(#glow)"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">知</text>
    </g>
    
    <!-- Weibo (top-right) -->
    <g transform="translate(115, -65)">
      <circle cx="0" cy="0" r="22" fill="#ff6600" filter="url(#glow)"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">微博</text>
    </g>
    
    <!-- Buzzing.cc (bottom-right) -->
    <g transform="translate(115, 65)">
      <circle cx="0" cy="0" r="22" fill="#00cc66" filter="url(#glow)"/>
      <text x="0" y="7" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Buzzing</text>
    </g>
    
    <!-- 36Kr (bottom) -->
    <g transform="translate(0, 135)">
      <circle cx="0" cy="0" r="22" fill="#ff3366" filter="url(#glow)"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">36氪</text>
    </g>
    
    <!-- Hacker News (bottom-left) -->
    <g transform="translate(-115, 65)">
      <circle cx="0" cy="0" r="22" fill="#ff6600" filter="url(#glow)"/>
      <text x="0" y="7" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">HN</text>
    </g>
    
    <!-- IT Home (top-left) -->
    <g transform="translate(-115, -65)">
      <circle cx="0" cy="0" r="22" fill="#00ccff" filter="url(#glow)"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">IT之家</text>
    </g>
    
    <!-- Center: Blade mini icon -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="35" fill="#0a1628" stroke="#00d4ff" stroke-width="2"/>
      <path d="M -8 -15 L -8 15 L 8 0 Z" fill="#00d4ff"/>
    </g>
  </g>
  
  <!-- Bottom: Features bar -->
  <g transform="translate(400, 520)">
    <rect x="0" y="0" width="480" height="50" rx="8" fill="#0d1f3c" stroke="#1a3a5c" stroke-width="1"/>
    
    <!-- Feature 1 -->
    <circle cx="40" cy="25" r="14" fill="#00d4ff" filter="url(#glow)"/>
    <text x="40" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0a1628">✓</text>
    <text x="65" y="30" font-family="'WenQuanYi Zen Hei', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#8899bb">数据源健康检查</text>
    
    <!-- Divider -->
    <line x1="160" y1="15" x2="160" y2="35" stroke="#1a3a5c" stroke-width="1"/>
    
    <!-- Feature 2 -->
    <circle cx="220" cy="25" r="14" fill="#00d4ff" filter="url(#glow)"/>
    <text x="220" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0a1628">✓</text>
    <text x="245" y="30" font-family="'WenQuanYi Zen Hei', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#8899bb">故障自动切换</text>
    
    <!-- Divider -->
    <line x1="360" y1="15" x2="360" y2="35" stroke="#1a3a5c" stroke-width="1"/>
    
    <!-- Feature 3 -->
    <circle cx="420" cy="25" r="14" fill="#00d4ff" filter="url(#glow)"/>
    <text x="420" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0a1628">✓</text>
    <text x="445" y="30" font-family="'WenQuanYi Zen Hei', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#8899bb">九边适配评分</text>
  </g>
  
  <!-- Corner decorations -->
  <path d="M 0 0 L 60 0 L 60 10 L 10 10 L 10 60 L 0 60 Z" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <path d="M 1280 0 L 1220 0 L 1220 10 L 1270 10 L 1270 60 L 1280 60 Z" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <path d="M 0 640 L 0 580 L 10 580 L 10 630 L 60 630 L 60 640 Z" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <path d="M 1280 640 L 1280 580 L 1270 580 L 1270 630 L 1220 630 L 1220 640 Z" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Version badge -->
  <g transform="translate(1100, 50)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#00d4ff" filter="url(#glow)"/>
    <text x="50" y="19" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0a1628" text-anchor="middle">v1.0.0</text>
  </g>
</svg>